<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SKT × Braincrew 하반기 킥오프 워크샵</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#15111C;
  --bg2:#1E1828;
  --ink:#F6EFE9;
  --muted:#A89BB2;
  --faint:#6E6379;
  --line:rgba(255,255,255,.10);
  --line-2:rgba(255,255,255,.16);

  --skt:#FF4B3E;     /* SKT coral-red */
  --crew:#7C6BFF;    /* Braincrew indigo */
  --gold:#FFC15E;

  --accent:#FF8A5B;  /* per-slide, overridden */
  --accent-soft:rgba(255,138,91,.16);

  --maxw:1080px;
  --pad: clamp(28px, 5vw, 96px);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:"Pretendard",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  letter-spacing:-.01em;
}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-feature-settings:"tnum" 1}

/* ---------- stage ---------- */
#stage{position:fixed;inset:0}
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:calc(var(--pad)) var(--pad) calc(var(--pad) + 78px);
  opacity:0;visibility:hidden;
  transform:translateY(14px);
  transition:opacity .5s ease, transform .55s cubic-bezier(.2,.7,.2,1), visibility 0s linear .55s;
  will-change:opacity,transform;
}
.slide.active{opacity:1;visibility:visible;transform:none;transition:opacity .55s ease, transform .6s cubic-bezier(.2,.7,.2,1)}
.slide.prev{transform:translateY(-14px)}
.inner{width:100%;max-width:var(--maxw);margin:0 auto}

/* ambient accent glow */
.slide::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:-1;
  background:
    radial-gradient(60% 55% at 84% 8%, color-mix(in srgb, var(--accent) 22%, transparent), transparent 70%),
    radial-gradient(70% 60% at 0% 100%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 72%);
  opacity:.9;
}

/* ---------- shared type ---------- */
.kicker{
  display:inline-flex;align-items:center;gap:10px;
  font-family:"JetBrains Mono",monospace;font-size:15px;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase;color:var(--accent);
  margin-bottom:26px;
}
.kicker::before{content:"";width:26px;height:2px;background:var(--accent);border-radius:2px}
.kicker .sub{color:var(--muted)}
.time{
  font-family:"JetBrains Mono",monospace;font-weight:500;
  font-size:clamp(21px,2.5vw,32px);color:var(--ink);
  letter-spacing:.02em;margin-bottom:10px;display:block;
}
h1.title{
  font-weight:800;line-height:1.04;margin:0;
  font-size:clamp(46px,7.6vw,96px);letter-spacing:-.03em;
}
h2.title{
  font-weight:800;line-height:1.06;margin:0 0 18px;
  font-size:clamp(40px,6vw,80px);letter-spacing:-.03em;
}
.lead{
  font-size:clamp(20px,2.4vw,28px);line-height:1.6;color:#E7DDEC;
  max-width:54ch;margin:18px 0 0;font-weight:400;
}
a{color:inherit}
a.link{
  color:var(--accent);text-decoration:none;font-weight:600;
  border-bottom:1.5px solid color-mix(in srgb,var(--accent) 45%,transparent);
  padding-bottom:1px;transition:border-color .2s,color .2s;white-space:nowrap;
}
a.link:hover{border-color:var(--accent)}
a.link::after{content:" ↗";font-weight:400;opacity:.7}

/* ---------- cover ---------- */
.cover h1{font-size:clamp(58px,11vw,150px);letter-spacing:-.04em;line-height:.96}
.cover .x{
  background:linear-gradient(120deg,var(--skt),var(--crew));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-weight:800;padding:0 .06em;
}
.cover .tag{
  margin:30px 0 0;font-size:clamp(20px,2.7vw,32px);color:#E7DDEC;font-weight:500;
  letter-spacing:-.02em;
}
.cover .meta{
  margin-top:38px;display:flex;flex-wrap:wrap;gap:10px 22px;align-items:center;
  font-family:"JetBrains Mono",monospace;font-size:clamp(15px,1.7vw,19px);color:var(--muted);
}
.cover .meta b{color:var(--ink);font-weight:500}
.cover .meta .dot{width:5px;height:5px;border-radius:50%;background:var(--faint)}
.dayarc{
  margin-top:46px;height:3px;width:min(560px,80%);border-radius:3px;
  background:linear-gradient(90deg,var(--gold),var(--skt) 30%,var(--crew) 64%,#3a2f5e);
  position:relative;
}
.dayarc::after{
  content:"☀  →  🌙";position:absolute;right:0;top:-26px;
  font-size:13px;letter-spacing:.3em;color:var(--muted);
  font-family:"JetBrains Mono",monospace;
}

/* ---------- info / 개요 ---------- */
.grid{display:grid;gap:18px}
.facts{grid-template-columns:1fr;gap:14px;margin-top:34px;max-width:760px}
.fact{
  display:grid;grid-template-columns:120px 1fr;gap:18px;align-items:baseline;
  padding:16px 0;border-top:1px solid var(--line);
}
.fact .lbl{
  font-family:"JetBrains Mono",monospace;font-size:14px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--accent);padding-top:3px;
}
.fact .val{font-size:clamp(18px,2.2vw,25px);line-height:1.5;color:#ECE3F0}
.fact .val small{color:var(--muted);font-size:.82em}

.people{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:760px}
.team{border:1px solid var(--line);border-radius:18px;padding:20px 22px;background:rgba(255,255,255,.018)}
.team h3{margin:0 0 14px;font-size:16px;font-family:"JetBrains Mono",monospace;letter-spacing:.06em;display:flex;align-items:center;gap:9px}
.team h3 .swatch{width:11px;height:11px;border-radius:3px}
.team.skt h3 .swatch{background:var(--skt)}
.team.crew h3 .swatch{background:var(--crew)}
.team .count{margin-left:auto;color:var(--muted);font-weight:400;font-size:13px}
.names{display:flex;flex-wrap:wrap;gap:8px}
.names span{
  font-size:17px;padding:7px 14px;border-radius:999px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);color:#E7DDEC;
}
.team.skt .names span:hover{border-color:color-mix(in srgb,var(--skt) 60%,transparent)}
.team.crew .names span:hover{border-color:color-mix(in srgb,var(--crew) 60%,transparent)}

/* ---------- agenda ---------- */
.agenda{margin-top:30px;display:grid;gap:2px;max-width:880px}
.arow{
  display:grid;grid-template-columns:140px 1fr auto;gap:20px;align-items:center;
  padding:15px 16px;border-radius:12px;text-decoration:none;color:inherit;
  border:1px solid transparent;transition:background .2s,border-color .2s,transform .2s;
  cursor:pointer;
}
.arow:hover{background:rgba(255,255,255,.04);border-color:var(--line);transform:translateX(4px)}
.arow .at{font-family:"JetBrains Mono",monospace;font-size:16px;color:var(--muted)}
.arow .an{font-size:clamp(19px,2.4vw,25px);font-weight:600;letter-spacing:-.02em}
.arow .an .em{margin-right:10px}
.arow .ad{font-size:13px;color:var(--faint);font-family:"JetBrains Mono",monospace;text-align:right}
.arow .bar{width:8px;height:8px;border-radius:50%;background:var(--c)}
.arow{grid-template-columns:14px 130px 1fr auto}

/* ---------- segment detail blocks ---------- */
.detail{margin-top:30px;display:grid;gap:14px;max-width:820px}
.block{
  border:1px solid var(--line);border-radius:16px;padding:20px 22px;
  background:rgba(255,255,255,.02);display:grid;gap:6px;
  border-left:3px solid var(--accent);
}
.block .bt{font-weight:700;font-size:clamp(19px,2.2vw,24px);letter-spacing:-.02em;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.block .bt .pill{
  font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:500;color:var(--accent);
  background:var(--accent-soft);padding:3px 10px;border-radius:999px;letter-spacing:.04em;
}
.block .bd{color:var(--muted);font-size:17.5px;line-height:1.55}
.block .bd b{color:#ECE3F0;font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
.chip{
  display:inline-flex;align-items:center;gap:9px;font-size:16.5px;
  padding:11px 18px;border-radius:12px;border:1px solid var(--line);
  background:rgba(255,255,255,.025);color:#E7DDEC;
}
.chip .k{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--accent);letter-spacing:.08em}

.note{
  margin-top:24px;display:inline-flex;align-items:center;gap:12px;
  font-size:16.5px;color:var(--muted);padding:13px 20px;border-radius:14px;
  background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
}
.note b{color:var(--ink)}

.meaning{
  margin-top:26px;border-left:3px solid var(--accent);
  padding:6px 0 6px 24px;max-width:60ch;
}
.meaning .m-text{
  margin:0;font-size:clamp(18px,2.1vw,24px);line-height:1.55;
  color:#F2E9F2;font-weight:500;letter-spacing:-.01em;
}
.meaning .m-quote{
  margin:18px 0 0;font-size:clamp(15px,1.6vw,18px);line-height:1.5;
  color:var(--muted);font-style:italic;
}
.meaning .m-quote .by{
  display:block;margin-top:7px;font-style:normal;
  font-family:"JetBrains Mono",monospace;font-size:13px;
  color:var(--accent);letter-spacing:.04em;
}

.cta{
  display:inline-flex;align-items:center;gap:11px;margin-top:28px;
  font-size:19px;font-weight:700;letter-spacing:-.01em;
  color:#15111C;background:var(--accent);
  padding:15px 30px;border-radius:14px;text-decoration:none;
  box-shadow:0 10px 34px -12px var(--accent);
  transition:transform .12s ease, box-shadow .2s ease, filter .2s;
}
.cta:hover{transform:translateY(-2px);filter:brightness(1.06);box-shadow:0 16px 44px -12px var(--accent)}
.cta:active{transform:translateY(0)}
.cta .arr{font-family:"JetBrains Mono",monospace;font-size:15px}

/* group assignment cards */
.groups{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:28px}
.gcard{
  position:relative;overflow:hidden;
  border:1px solid var(--line);border-top:3px solid var(--gc);
  border-radius:18px;padding:20px 20px 22px;background:rgba(255,255,255,.022);
}
.gcard::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(85% 55% at 50% 0%, color-mix(in srgb,var(--gc) 18%,transparent), transparent 70%);
}
.gcard>*{position:relative}
.gname{font-size:clamp(22px,2.4vw,28px);font-weight:800;color:var(--gc);letter-spacing:-.02em}
.gtheme{
  display:flex;align-items:center;gap:9px;margin:2px 0 14px;
  font-size:clamp(17px,1.9vw,21px);font-weight:700;color:var(--ink);letter-spacing:-.02em;
}
.gtheme .ic{font-size:1.2em}
.tlabel{
  font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.1em;
  text-transform:uppercase;margin:14px 0 8px;
}
.tlabel.skt{color:var(--skt)} .tlabel.crew{color:var(--crew)}
.mem{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:rgba(255,255,255,.04);border:1px solid var(--line);
  border-radius:10px;padding:9px 14px;margin-bottom:7px;
}
.mem .mn{font-size:16px;font-weight:600;color:#ECE3F0}
.mem .mc{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}

/* big section number watermark */
.bignum{
  position:absolute;right:var(--pad);top:calc(var(--pad) - 10px);
  font-family:"JetBrains Mono",monospace;font-weight:700;
  font-size:clamp(80px,14vw,200px);line-height:1;color:var(--accent);
  opacity:.10;letter-spacing:-.04em;pointer-events:none;user-select:none;
}

/* ---------- bottom navigation / day-arc spine ---------- */
#navbar{
  position:fixed;left:0;right:0;bottom:0;height:78px;z-index:50;
  display:flex;align-items:center;gap:20px;
  padding:0 var(--pad);
  background:linear-gradient(0deg, color-mix(in srgb,var(--bg) 92%,transparent), transparent);
}
#spine{display:flex;flex:1;gap:6px;height:46px;align-items:stretch}
.seg{
  position:relative;flex-grow:var(--g);flex-basis:0;
  border:none;background:transparent;padding:0;cursor:pointer;
  display:flex;flex-direction:column;justify-content:flex-end;gap:6px;
  min-width:0;font-family:inherit;
}
.seg .barwrap{height:7px;border-radius:6px;background:rgba(255,255,255,.09);overflow:hidden;position:relative}
.seg .fill{position:absolute;inset:0;border-radius:6px;background:var(--c);transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.2,.7,.2,1);opacity:.55}
.seg.done .fill{transform:scaleX(1);opacity:.4}
.seg.current .fill{transform:scaleX(1);opacity:1}
.seg .lab{
  font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.02em;
  color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .25s;text-align:left;
}
.seg.current .lab{color:var(--c)}
.seg:hover .lab{color:var(--muted)}
.seg.current:hover .lab{color:var(--c)}

#nav-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.counter{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--muted)}
.counter b{color:var(--ink)}
.navbtn{
  width:38px;height:38px;border-radius:11px;border:1px solid var(--line-2);
  background:rgba(255,255,255,.03);color:var(--ink);cursor:pointer;
  display:grid;place-items:center;font-size:17px;transition:background .15s,border-color .15s,transform .1s;
}
.navbtn:hover{background:rgba(255,255,255,.09);border-color:var(--line-2)}
.navbtn:active{transform:scale(.94)}
.navbtn:disabled{opacity:.3;cursor:default}

:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}

/* hint */
#hint{
  position:fixed;top:18px;right:24px;z-index:40;
  font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--faint);
  letter-spacing:.04em;opacity:1;transition:opacity .6s;
}
#hint.hide{opacity:0}

@media (max-width:720px){
  body{overflow:auto}
  .people,.facts{grid-template-columns:1fr}
  .groups{grid-template-columns:1fr}
  .fact{grid-template-columns:92px 1fr;gap:12px}
  .arow{grid-template-columns:10px 84px 1fr;gap:12px}
  .arow .ad{display:none}
  .seg .lab{display:none}
  #spine{gap:4px}
  .bignum{display:none}
  #hint{display:none}
}
@media (prefers-reduced-motion:reduce){
  .slide,.slide.active{transition:opacity .2s ease}
  .seg .fill{transition:none}
  *{scroll-behavior:auto!important}
}
</style>
</head>
<body>

<div id="hint" class="mono">← → 또는 클릭으로 이동</div>
<div id="stage"></div>

<nav id="navbar">
  <div id="spine"></div>
  <div id="nav-right">
    <span class="counter mono"><b id="cur">1</b> / <span id="tot">9</span></span>
    <button class="navbtn" id="prev" aria-label="이전">←</button>
    <button class="navbtn" id="next" aria-label="다음">→</button>
  </div>
</nav>

<script>
/* ---------- accents per time-of-day ---------- */
const A = {
  ice:   {c:'#FF8A5B', s:'rgba(255,138,91,.16)'},
  all:   {c:'#FF4B3E', s:'rgba(255,75,62,.16)'},
  brk:   {c:'#5FC9A6', s:'rgba(95,201,166,.16)'},
  rule:  {c:'#7C6BFF', s:'rgba(124,107,255,.16)'},
  act:   {c:'#C361E6', s:'rgba(195,97,230,.16)'},
  dine:  {c:'#FFC15E', s:'rgba(255,193,94,.16)'},
  neutral:{c:'#9C8BD6', s:'rgba(156,139,214,.14)'}
};

/* duration in minutes drives the spine proportions */
const SEGS = [
  {key:'ice',  t:'13:30', label:'아이스브레이킹', dur:30},
  {key:'all',  t:'14:00', label:'전체 공유',     dur:60},
  {key:'brk',  t:'15:00', label:'Break',        dur:20},
  {key:'rule', t:'15:20', label:'조별 토의',  dur:40},
  {key:'act',  t:'16:00', label:'방탈출',        dur:90},
  {key:'dine', t:'18:00', label:'만찬',          dur:120},
];

/* ---------- slides ---------- */
const slides = [
  /* 0 — cover */
  {accent:'neutral', seg:-1, html:`
    <div class="inner cover">
      <div class="kicker">2026 상반기 Workshop</div>
      <h1>Braincrew <span class="x">×</span> SKT</h1>
      <p class="tag">함께 달려온 상반기를 돌아보고, 하반기를 같이 그리는 하루</p>
      <div class="meta">
        <span><b>2026. 6. 30</b> TUE</span><span class="dot"></span>
        <span><b>13:30 – 20:00</b></span><span class="dot"></span>
        <span>이화여대 <b>SK텔레콤관</b></span>
      </div>
      <div class="dayarc"></div>
    </div>`},

  /* 1 — 개요 */
  {accent:'all', seg:-1, html:`
    <div class="inner">
      <div class="kicker">OVERVIEW <span class="sub">· 개요</span></div>
      <h2 class="title">오늘의 한눈에</h2>
      <div class="grid facts">
        <div class="fact"><div class="lbl">일시</div><div class="val">2026. 6. 30 (화) · <span class="mono">13:30 – 20:00</span></div></div>
        <div class="fact"><div class="lbl">장소</div><div class="val">이화여대 SK텔레콤관</div></div>
        <div class="fact"><div class="lbl">참석</div><div class="val">총 <b>12명</b> · SKT 6 + 브레인크루 6</div></div>
      </div>
      <div class="people">
        <div class="team skt">
          <h3><span class="swatch"></span>SKT<span class="count">6명</span></h3>
          <div class="names"><span>김홍준</span><span>이준구</span><span>정제찬</span><span>이영준</span><span>안준성</span><span>문태희</span></div>
        </div>
        <div class="team crew">
          <h3><span class="swatch"></span>BRAINCREW<span class="count">6명</span></h3>
          <div class="names"><span>최재훈</span><span>김성연</span><span>문희선</span><span>신승엽</span><span>황재성</span><span>김태한</span></div>
        </div>
      </div>
    </div>`},

  /* 2 — 전체 일정 */
  {accent:'neutral', seg:-1, html:`
    <div class="inner">
      <div class="kicker">AGENDA <span class="sub">· 전체 일정</span></div>
      <h2 class="title">낮에서 밤까지, 오늘의 흐름</h2>
      <div class="agenda">
        <div class="arow" data-go="3"><span class="bar" style="--c:${A.ice.c}"></span><span class="at">13:30–14:00</span><span class="an"><span class="em">🧊</span>아이스브레이킹</span><span class="ad">조별</span></div>
        <div class="arow" data-go="4"><span class="bar" style="--c:${A.all.c}"></span><span class="at">14:00–15:00</span><span class="an"><span class="em">🎙️</span>전체 함께 하는 시간</span><span class="ad">소회 · 발표</span></div>
        <div class="arow" data-go="5"><span class="bar" style="--c:${A.brk.c}"></span><span class="at">15:00–15:20</span><span class="an"><span class="em">☕</span>Break Time</span><span class="ad">20분</span></div>
        <div class="arow" data-go="6"><span class="bar" style="--c:${A.rule.c}"></span><span class="at">15:20–16:00</span><span class="an"><span class="em">📐</span>조별 토의 및 발표</span><span class="ad">함께 할 것들</span></div>
        <div class="arow" data-go="7"><span class="bar" style="--c:${A.act.c}"></span><span class="at">16:00–17:30</span><span class="an"><span class="em">🔐</span>Activity · 방탈출</span><span class="ad">조별</span></div>
        <div class="arow" data-go="9"><span class="bar" style="--c:${A.dine.c}"></span><span class="at">18:00–20:00</span><span class="an"><span class="em">🍽️</span>만찬</span><span class="ad">마무리</span></div>

/* ---------- render ---------- */
const stage = document.getElementById('stage');
slides.forEach((s,i)=>{
  const el = document.createElement('section');
  el.className = 'slide';
  const a = A[s.accent] || A.neutral;
  el.style.setProperty('--accent', a.c);
  el.style.setProperty('--accent-soft', a.s);
  el.dataset.seg = s.seg;
  el.innerHTML = s.html;
  stage.appendChild(el);
});
const slideEls = [...document.querySelectorAll('.slide')];

/* first slide index for each segment (segments can span multiple slides) */
const segFirst = {};
slideEls.forEach((el,i)=>{const s=+el.dataset.seg; if(s>=0 && segFirst[s]===undefined) segFirst[s]=i;});

/* spine */
const spine = document.getElementById('spine');
const totalDur = SEGS.reduce((n,s)=>n+s.dur,0);
SEGS.forEach((sg,i)=>{
  const a = A[sg.key];
  const b = document.createElement('button');
  b.className='seg';
  b.style.setProperty('--g', sg.dur);
  b.style.setProperty('--c', a.c);
  b.innerHTML = `<div class="barwrap"><div class="fill"></div></div><span class="lab mono">${sg.t} ${sg.label}</span>`;
  b.addEventListener('click',()=>{const t=segFirst[i]; if(t!==undefined) go(t);});
  spine.appendChild(b);
});
const segEls = [...document.querySelectorAll('.seg')];

document.getElementById('tot').textContent = slides.length;

/* ---------- navigation ---------- */
let idx = 0;
function go(n){
  n = Math.max(0, Math.min(slides.length-1, n));
  slideEls.forEach((el,i)=>{
    el.classList.toggle('active', i===n);
    el.classList.toggle('prev', i<n);
  });
  idx = n;
  document.getElementById('cur').textContent = n+1;
  document.getElementById('prev').disabled = n===0;
  document.getElementById('next').disabled = n===slides.length-1;

  const curSeg = parseInt(slideEls[n].dataset.seg, 10);
  segEls.forEach((s,i)=>{
    s.classList.toggle('current', i===curSeg);
    s.classList.toggle('done', curSeg>=0 && i<curSeg);
  });
  if(n>0) document.getElementById('hint').classList.add('hide');
}
const next=()=>go(idx+1), prev=()=>go(idx-1);
document.getElementById('next').addEventListener('click',next);
document.getElementById('prev').addEventListener('click',prev);

document.addEventListener('keydown',e=>{
  if(['ArrowRight','PageDown',' ','Enter'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){go(0);}
  else if(e.key==='End'){go(slides.length-1);}
  else if(/^[1-9]$/.test(e.key)){go(parseInt(e.key,10)-1);}
});

/* agenda row jumps */
document.addEventListener('click',e=>{
  const r = e.target.closest('[data-go]');
  if(r) go(parseInt(r.dataset.go,10));
});

/* swipe */
let sx=0;
addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
addEventListener('touchend',e=>{
  const d=e.changedTouches[0].clientX-sx;
  if(Math.abs(d)>60){ d<0?next():prev(); }
},{passive:true});

go(0);
</script>
